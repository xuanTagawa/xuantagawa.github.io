<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>丙級硬體裝修檢定</title>
</head>
<body>
    <!-- 字體大小設為H3，顏色需依當場監評指定修正為red, green, blue -->
    <h3 style="color: red;">
        考位號碼：XX<br>
        日期：YYYY/MM/DD<br>
        姓名：應檢人姓名
    </h3>
</body>
<script>
  // 從你的雲端網址抓取 JSON 資料
  fetch('player_save.json')
    .then(response => response.json())
    .then(data => {
      console.log("玩家等級是：" + data.level);
      alert("歡迎回來，" + data.player_id + "！你的等級是 " + data.level);
    });
</script>
</html>
