<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>新手級網站練習自我檢定</title>
</head>
<body>
    <!-- 字體大小設為H3，顏色需依當場監評指定修正為red, green, blue -->
    <h3 style="color: red;">
        考位號碼：001<br>
        啟用日期：2026/03/31<br>
        姓名：我
    </h3>
    <h2 id="welcome-msg">正在連線資料庫...</h2>
</body>

<script>
fetch('player_save.json')
  .then(response => response.json())
  .then(data => {
    // 這裡改用 DOM 操作，把抓到的玩家名字塞進網頁標題
    document.getElementById('welcome-msg').innerText = "歡迎回來，" + data.player_id + "！";
    console.log("資料讀取成功：", data);
  })
  .catch(err => {
    document.getElementById('welcome-msg').innerText = "讀取失敗，請檢查網路。";
  });

</html>
